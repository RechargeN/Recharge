name: mobile-tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve app directory
        id: appdir
        shell: bash
        run: |
          if [ -f "apps/mobile/pubspec.yaml" ]; then
            echo "dir=apps/mobile" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: ${{ steps.appdir.outputs.dir }}
        run: flutter pub get

      - name: Test
        working-directory: ${{ steps.appdir.outputs.dir }}
        run: flutter test
